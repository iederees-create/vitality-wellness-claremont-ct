    <!--
      DEMO JSON-LD — buyers must replace every value below (name, address,
      phone, geo coordinates, url, image) with their real business details
      before publishing. This is fictional demonstration data only.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HealthAndBeautyBusiness",
        "name": "Vitality Wellness",
        "description": "A fictional demonstration wellness studio offering facials, massage and mindful body treatments in Claremont, CT.",
        "url": "https://iederees-create.github.io/vitality-wellness-claremont-ct/",
        "telephone": "+12035550148",
        "email": "hello@vitalitywellness.example",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "221 Maple Ridge Lane",
          "addressLocality": "Claremont",
          "addressRegion": "CT",
          "postalCode": "06001",
          "addressCountry": "US"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "09:00",
            "closes": "19:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Saturday"],
            "opens": "09:00",
            "closes": "16:00"
          }
        ]
      }
    </script>
